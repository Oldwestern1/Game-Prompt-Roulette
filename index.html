    <div class="wallpaper-layer" id="wallpaperLayer" aria-hidden="true"></div>
    <button class="mode-toggle" id="modeToggle" aria-label="Switch between light and dark mode" title="Switch theme">&#9818;</button>

    <div class="page">
        <div class="header-block">
            <div class="title-row">
                <svg class="die" id="dieLeft" aria-hidden="true"><use href="#icon-dice-three"></use></svg>
                <h1 id="appTitle">Game Prompt Roulette</h1>
                <svg class="die" id="dieRight" aria-hidden="true"><use href="#icon-dice-five"></use></svg>
            </div>
            <div class="title-rule" aria-hidden="true">⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯</div>
        </div>

        <div class="container">
            <div class="left-column">
                <div class="settings-panel">
                    <h2>Randomizer</h2>

                    <div class="setting-row active" id="row-themes">
                        <div class="setting-control">
                            <div class="control-left">
                                <input type="number" id="numThemes" class="number-input" value="2" min="1" max="4">
                                <label>Themes</label>
                            </div>
                            <label class="switch">
                                <input type="checkbox" id="toggle-themes" checked onchange="updateRowState('themes')">
                                <span class="slider"></span>
                            </label>
                        </div>
                        <button class="pool-toggle" data-target="pool-wrapper-themes">[+] Show pool</button>
                        <div id="pool-wrapper-themes" class="pool-wrapper">
                            <input type="text" class="pool-search" placeholder="Search themes..." oninput="filterPool(this)">
                            <div id="pool-themes"></div>
                            <div class="pool-meta" id="pool-meta-themes"></div>
                        </div>
                    </div>

                    <div class="setting-row active" id="row-mechanics">
                        <div class="setting-control">
                            <div class="control-left">
                                <input type="number" id="numMechanics" class="number-input" value="2" min="1" max="6">
                                <label>Mechanics</label>
                            </div>
                            <label class="switch">
                                <input type="checkbox" id="toggle-mechanics" checked onchange="updateRowState('mechanics')">
                                <span class="slider"></span>
                            </label>
                        </div>
                        <button class="pool-toggle" data-target="pool-wrapper-mechanics">[+] Show pool</button>
                        <div id="pool-wrapper-mechanics" class="pool-wrapper">
                            <input type="text" class="pool-search" placeholder="Search mechanics..." oninput="filterPool(this)">
                            <div id="pool-mechanics"></div>
                            <div class="pool-meta" id="pool-meta-mechanics"></div>
                        </div>
                    </div>

                    <div class="setting-row active" id="row-components">
                        <div class="setting-control">
                            <div class="control-left">
                                <input type="number" id="numComponents" class="number-input" value="2" min="1" max="6">
                                <label>Components</label>
                            </div>
                            <label class="switch">
                                <input type="checkbox" id="toggle-components" checked onchange="updateRowState('components')">
                                <span class="slider"></span>
                            </label>
                        </div>
                        <button class="pool-toggle" data-target="pool-wrapper-components">[+] Show pool</button>
                        <div id="pool-wrapper-components" class="pool-wrapper">
                            <input type="text" class="pool-search" placeholder="Search components..." oninput="filterPool(this)">
                            <div id="pool-components"></div>
                            <div class="pool-meta" id="pool-meta-components"></div>
                        </div>
                    </div>
                </div>
                <div class="spin-error" id="spinError"></div>
                <button class="btn-spin" id="spinBtn" onclick="startSpin()">Hit Me!</button>
            </div>

            <div class="randomizer-panel">
                <div class="results-stack" id="resultsContainer"></div>
                <div class="prompt-container" id="promptBox" style="display: none;">
                    <h3>
                        <span>Generated Prompt</span>
                        <button class="copy-btn" id="copyBtn" onclick="copyPrompt()">Copy prompt</button>
                    </h3>
                    <div class="prompt-text" id="finalPrompt"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="wallpaper-btn-wrap">
        <svg class="wallpaper-progress-ring" id="wallpaperProgressRing" viewBox="0 0 48 48">
            <circle cx="24" cy="24" r="22"/>
        </svg>
        <button class="wallpaper-style-btn" id="wallpaperStyleBtn" aria-label="Cycle background style" title="Cycle background style">&#9830;</button>
    </div>

    <script src="js/app.js" defer></script>
</body>
</html>
